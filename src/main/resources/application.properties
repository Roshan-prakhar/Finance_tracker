spring.application.name=moneymanager

# ====== Database: H2 file-based (simple, zero-setup) ======
# Override with SPRING_DATASOURCE_URL etc. via env vars for production.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/moneymanager;AUTO_SERVER=TRUE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# ====== JPA / Hibernate ======
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ====== H2 Console (handy for local debugging at /h2-console) ======
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ====== Connection Pool (small, since H2 is single-instance) ======
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ====== Security / JWT ======
jwt.secret=${JWT_SECRET:2b8e7c7e-4e2a-4b1a-9c2e-8f7e2d3c4b5a}

# ====== Frontend / CORS ======
money.manager.frontend.url=${MONEY_MANAGER_FRONTEND_URL:http://localhost:5173}
app.activation.url=${APP_ACTIVATION_URL:http://localhost:8080/}

# ====== Server ======
server.port=${PORT:8080}
server.address=0.0.0.0

# NOTE: H2 file DB is fine for development and simple single-instance deployments.
# For production-grade workloads, set SPRING_DATASOURCE_URL etc. to a managed DB.

