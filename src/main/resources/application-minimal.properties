# Minimal configuration for testing - no database required
spring.application.name=moneymanager

# Disable database auto-configuration
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# Server Configuration
server.port=${PORT:8080}
server.address=0.0.0.0

# Security Configuration (minimal)
jwt.secret=${JWT_SECRET:test-secret-key-for-minimal-config}

# CORS Configuration
money.manager.frontend.url=${MONEY_MANAGER_FRONTEND_URL:https://money-manger-webapp.onrender.com}
app.activation.url=${APP_ACTIVATION_URL:https://moneymanager-backend.onrender.com/}

# Logging
logging.level.in.ROSHAN.moneymanager=DEBUG
logging.level.org.springframework=INFO
