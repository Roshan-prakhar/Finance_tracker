services:
  - type: web
    name: moneymanager-backend
    env: java
    plan: free
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/moneymanager.jar
    # Free instance has ephemeral disk; H2 DB file is recreated on each deploy.
    # Attach a Render Disk if you need persistence.
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: MONEY_MANAGER_FRONTEND_URL
        value: https://finance-tracker-28.netlify.app
      - key: APP_ACTIVATION_URL
        value: https://moneymanager-backend.onrender.com/
      # No SPRING_DATASOURCE_* vars => application.properties default kicks in
      # (jdbc:h2:file:./data/moneymanager;AUTO_SERVER=TRUE)
