## Production configuration adapted for simple H2 file DB deployment
# Use an H2 file database by default for simple deployments. Override with
# environment variables if you want a different datasource.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/moneymanager;DB_CLOSE_ON_EXIT=FALSE;AUTO_SERVER=TRUE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# Use H2 dialect by default for this profile (override with SPRING_JPA_DATABASE_PLATFORM)
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Connection pool tuning (small for single-instance H2 usage)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=60000

# Basic security & frontend integration
jwt.secret=${JWT_SECRET:default-prod-jwt-secret}
money.manager.frontend.url=${MONEY_MANAGER_FRONTEND_URL:https://money-manger-webapp.onrender.com}
app.activation.url=${APP_ACTIVATION_URL}

# Server Configuration
server.port=${PORT:8080}
server.address=0.0.0.0

# NOTE: H2 is file-based here and suitable only for simple/single-instance deployments.
# For production-grade, use PostgreSQL or another external managed DB.

